name: release

# Builds Keryx Wallet installers (Windows + Linux + macOS) plus a Windows portable .exe and
# attaches them ALL to a SINGLE draft GitHub Release.
# Trigger by pushing a version tag (e.g. `git tag v0.1.1 && git push origin v0.1.1`),
# or run manually from the Actions tab.
#
# A dedicated `create-release` job makes the draft release ONCE and passes its id to the build
# matrix (via tauri-action's `releaseId`), so the platform jobs upload to the same release
# instead of each racing to create their own draft — which used to produce duplicate drafts.
# The release is left as a DRAFT for manual review + publish.
#
# macOS builds a UNIVERSAL binary (--target universal-apple-darwin) so the single .dmg/.app
# runs natively on both Apple Silicon and Intel Macs. Apple code signing + notarization are
# OPTIONAL: set the APPLE_* repository secrets (see the macOS step below) to produce a signed,
# notarized build; if they are absent the build still succeeds but ships unsigned, so macOS
# Gatekeeper will show an "unidentified developer" warning (right-click → Open to run).
#
# The WASM wallet SDK (src/sdk/) is committed, so CI does NOT rebuild it (no clang/wasm-pack
# needed) — it only builds the Tauri shell + bundles the prebuilt dist.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload artifacts

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.mk.outputs.release_id }}
      release_tag: ${{ steps.mk.outputs.release_tag }}
    steps:
      - name: Create the draft release (once)
        id: mk
        uses: actions/github-script@v7
        with:
          script: |
            const isTag = context.ref.startsWith('refs/tags/');
            const tag = isTag
              ? context.ref.replace('refs/tags/', '')
              : `v0.0.0-dev-${context.runNumber}`;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Keryx Wallet ${tag}`,
              body: 'Keryx Wallet installers. Verify checksums before installing.',
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', String(data.id));
            core.setOutput('release_tag', tag);

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest   # → .msi (WiX) + .exe (NSIS) + portable .exe
          - platform: ubuntu-22.04      # → .deb + .AppImage (+ .rpm)
          - platform: macos-14          # → universal .app + .dmg (Apple Silicon + Intel)
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri v2)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # A universal macOS binary is a lipo-merged aarch64 + x86_64 build, so both Apple Silicon
      # and Intel stdlib targets must be installed. No-op on Windows/Linux (skipped via the `if`).
      - name: Add macOS Rust targets (universal binary)
        if: matrix.platform == 'macos-14'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build + bundle (Tauri) → upload to the shared release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional Apple code signing + notarization. Leave the APPLE_* secrets unset to ship an
          # unsigned build (Gatekeeper will warn "unidentified developer"; right-click → Open to run).
          # To sign: set APPLE_SIGNING_IDENTITY (e.g. "Developer ID Application: Team (ID)"), and for
          # notarization set APPLE_ID, APPLE_PASSWORD (app-specific), and APPLE_TEAM_ID. If you keep
          # the keychain-less flow, also set APPLE_CERTIFICATE (base64 .p12) + APPLE_CERTIFICATE_PASSWORD.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      # The portable is a special --features portable --no-bundle build, so tauri-action
      # doesn't emit it. Build it natively on the Windows runner and attach it by release id.
      - name: Build Windows portable + attach to the release
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          npm run tauri build -- --features portable --no-bundle
          VER=$(node -p "require('./package.json').version")
          OUT="Keryx.Wallet_${VER}_x64_portable.exe"
          cp "src-tauri/target/release/keryx-wallet.exe" "$OUT"
          curl -sSf -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$OUT" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${OUT}"
