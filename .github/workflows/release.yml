name: release

# Builds Keryx Wallet installers for Windows + Linux and attaches them to a GitHub Release.
# Trigger by pushing a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
# or run manually from the Actions tab.
#
# The WASM wallet SDK (src/sdk/) is committed, so CI does NOT rebuild it (no clang/wasm-pack
# needed) — it only builds the Tauri shell + bundles the prebuilt dist.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload artifacts

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest   # → .msi (WiX) + .exe (NSIS)
          - platform: ubuntu-22.04      # → .deb + .AppImage (+ .rpm)
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri v2)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build + bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.0-dev-{0}', github.run_number) }}
          releaseName: "Keryx Wallet ${{ github.ref_type == 'tag' && github.ref_name || 'dev build' }}"
          releaseBody: "Keryx Wallet installers. Verify checksums before installing."
          releaseDraft: true
          prerelease: false
